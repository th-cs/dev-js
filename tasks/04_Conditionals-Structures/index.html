<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta
		name="viewport"
		content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
	<title>Aula 04- Estruturas condicionais</title>
	<style>
		h1 {
			font-family: monospace;
		}
	</style>
</head>
<body>
	<h1>Estruturas condicionais</h1>

	<script>

		let age = Number(prompt("Olá, qual é a sua idade?"));

		if (!isNaN(age)){
			if (age > 0 && age < 125) {
				if (age < 12) {
					alert("Você é uma criança!");
				} else if (age >= 12 && age < 18) {
					alert("Você é um adolescente!");
				} else if (age >= 18 && age < 60) {
					alert("Você é um adulto!");
				} else {
					alert("Você é um idoso!");
				}
			} else {
				alert("Essa não é a sua idade!");
			}
		} else {
			alert("Você digitou um valor não aceito!");
		}

	</script>
</body>
</html>
