<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta
		name="viewport"
		content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
	<title>Nota</title>
	<style>
		h1,
		label,
		input,
		button,
		p {
			font-family: monospace;
		}

		body {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 20px;
			width: 100%;
		}

		main {
			display: flex;
			flex-direction: column;
			align-items: center;
			padding: 12px;
			gap: 14px;
			width: 30%;
			border: 1px dashed #537EC8;
			border-radius: 10px;

			label {
				font-size: 16px;
			}

			input {
				padding: 8px 16px;
				border: 1px solid #CDCDCD;
				border-radius: 10px;
				width: 20%;
			}

			button {
				padding: 6px 16px;
			}

			p {
				font-size: 14px;
			}
		}

	</style>
</head>
<body>
	<header>
		<h1>Desempenho com base na nota</h1>
	</header>
	<main>
		<label for="grade">Olá, digite a sua nota: </label>
		<input
			id="grade"
			type="number"
			min="0"
			max="10"
			step="0.1"
			placeholder="9.5"
			required>
		<button
			id="submitBtn"
			type="submit">
			Enviar
		</button>
		<p id="result"></p>
	</main>

	<script>

		const inputElement = document.getElementById("grade");
		const btnElement = document.getElementById("submitBtn");
		const resultElement = document.getElementById("result");

		let gradeValue;
		let resultText;

		btnElement.addEventListener('click', () => {
			resultElement.textContent = " ";

			gradeValue = inputElement.value;

			if (gradeValue >= 9) {
				resultText = "Excelente!";
			} else if (gradeValue >= 7 && gradeValue < 9) {
				resultText = "Bom!";
			} else if (gradeValue >= 5 && gradeValue < 7) {
				resultText = "Regular!";
			} else {
				resultText = "Reprovado!";
			}

			resultElement.textContent += `A sua nota foi ${gradeValue}. `
				+ `Você foi ${resultText}`;
		});

	</script>
</body>
</html>
