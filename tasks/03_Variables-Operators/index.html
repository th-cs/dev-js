<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
	<title>Aula 03 - Variáveis e Operadores</title>
	<style>
		h1,
		h2,
		p,
		li {
			font-family: monospace;
		}

		li {
			padding: 4px 0;
		}
	</style>
</head>
<body>
	<header>
		<h1>Variáveis e Operadores</h1>
	</header>
	<main>
		<h2>Informações: </h2>
		<p id="info"></p>
		<p id="values"></p>
		<h2>Cálculos: </h2>
		<ul>
			<li id="sum"></li>
			<li id="subtraction"></li>
			<li id="multiplication"></li>
			<li id="division"></li>
		</ul>
	</main>

	<script>
		const elementInfo = document.getElementById("info");
		const elementValues = document.getElementById("values");

		const elementSum = document.getElementById("sum");
		const elementSubtraction = document.getElementById("subtraction");
		const elementMultiplication = document.getElementById("multiplication");
		const elementDivision = document.getElementById("division");

		let name = prompt("Qual é o seu nome?");
		let age = Number(prompt("Qual é a sua idade?"));
		let city = prompt("Em qual cidade você vive?");

		let x = Number(prompt("Digite o primeiro valor:"));
		let y = Number(prompt("Digite o segundo valor:"));

		elementInfo.textContent = `O seu nome é ${name}, você tem ${age} anos `
			+ `e a sua cidade atual é ${city}`;
		elementValues.textContent = "Os valores que você digitou foram " + x
			+ " e " + y;

		elementSum.textContent = `Soma: ${x} + ${y} = ${x + y}`;
		elementSubtraction.textContent = `Subtração: ${x} - ${y} = ${x - y}`;
		elementMultiplication.textContent = `Multiplicação: ${x} x ${y} `
			+ ` = ${x * y}`;
		elementDivision.textContent = `Divisão: ${x} / ${y} = ${x / y}`;

		console.log(`O seu nome é ${name}, você tem ${age} anos e a sua cidade `
			+ `atual é ${city}`);
		console.log("Os valores que você digitou foram " + x + " e " + y);

		console.log(`Soma: ${x} + ${y} = ${x + y}`);
		console.log(`Subtração: ${x} - ${y} = ${x - y}`);
		console.log(`Multiplicação: ${x} x ${y} = ${x * y}`);
		console.log(`Divisão: ${x} / ${y} = ${x / y}`);
	</script>
</body>
</html>
